<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Unit Converter – Length & Weight</title>
  <meta name="description" content="Unit converter for length and weight. Simple and fast." />
  <link rel="icon" href="/favicon.ico" />
  <link rel="manifest" href="/site.webmanifest" />
  <link rel="stylesheet" href="/assets/css/styles.css" />
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="/">Utility Hub</a>
      <nav class="nav">
        <a class="nav-link" href="/">Home</a>
        <a class="nav-link is-active" href="/#tools">Tools</a>
        <a class="nav-link" href="/contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <main id="main" class="container">
    <div class="page-head">
      <h1>Unit Converter</h1>
      <p class="muted">Length + weight conversions.</p>
    </div>

    <section class="tool">
      <div class="panel narrow">
        <div class="form-row">
          <label>Type</label>
          <select id="ucType">
            <option value="length">Length</option>
            <option value="weight">Weight</option>
          </select>
        </div>

        <div class="form-row"><label>Value</label><input id="ucValue" inputmode="decimal" placeholder="e.g. 10" /></div>

        <div class="tool-grid">
          <div class="form-row"><label>From</label><select id="ucFrom"></select></div>
          <div class="form-row"><label>To</label><select id="ucTo"></select></div>
        </div>

        <button class="btn" id="ucBtn">Convert</button>

        <div class="result" id="ucRes" aria-live="polite">
          <div class="result-label">Result</div>
          <div class="result-value">—</div>
          <div class="result-sub muted"></div>
        </div>
      </div>

      <div class="ad-slot" aria-label="Advertisement">
        <div class="ad-placeholder">Ad placement (below results)</div>
      </div>

      <div class="backline"><a class="muted-link" href="/">← Back to tools</a></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="footer-links">
        <a href="/privacy.html" class="muted-link">Privacy</a>
        <a href="/contact.html" class="muted-link">Contact</a>
      </div>
      <div class="muted">Made simple.</div>
    </div>
  </footer>

  <script src="/assets/js/app.js" defer></script>
  <script src="/assets/js/unit-converter.js" defer></script>
</body>
</html>
